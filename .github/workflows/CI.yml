name: CI
on:
  pull_request:
    branches:
      - main
      - develop
jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Pull LFS files
        run: git lfs pull

      - name: Build and Test
        run: |
          xcodebuild build test \
            -project Challenge13/EyeSearch.xcodeproj \
            -scheme Challenge13 \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.1' \
            CODE_SIGNING_ALLOWED=NO
