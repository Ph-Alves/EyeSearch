name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull
      
      - name: Build
        run: |
          xcodebuild build \
            -project Challenge13/EyeSearch.xcodeproj \
            -scheme Challenge13 \
            -destination 'platform=iOS Simulator,id=F18AA328-AF61-4BA2-8AD8-AB876239B2A8' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project Challenge13/EyeSearch.xcodeproj \
            -scheme Challenge13 \
            -destination 'platform=iOS Simulator,id=F18AA328-AF61-4BA2-8AD8-AB876239B2A8' \
            CODE_SIGNING_ALLOWED=NO
