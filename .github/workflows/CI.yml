name: CI
on:
  pull_request:
    branches:
      - main
      - develop
jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Build
        run: |
          xcodebuild build \
            -project Challenge13/EyeSearch.xcodeproj \
            -scheme Challenge13 \
            -destination 'platform=iOS Simulator,name=Any iOS Simulator Device' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project Challenge13/EyeSearch.xcodeproj \
            -scheme Challenge13 \
            -destination 'platform=iOS Simulator,name=Any iOS Simulator Device' \
            CODE_SIGNING_ALLOWED=NO
