name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          xcodebuild build \
            -project Challenge13/EyeSearch.xcodeproj \
            -scheme Challenge13 \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=26.0.1' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project Challenge13/EyeSearch.xcodeproj \
            -scheme Challenge13 \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=26.0.1' \
            CODE_SIGNING_ALLOWED=NO
